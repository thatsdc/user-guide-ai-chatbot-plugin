services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    container_name: qdrant
    ports:
      - 6333:6333
      - 6334:6334
    expose:
      - 6333
      - 6334
      - 6335
    volumes:
      - ./qdrant_data:/qdrant/storage
    profiles:
      - qdrant_no_auth

  qdrant_auth:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    container_name: qdrant_auth
    ports:
      - 6333:6333
      - 6334:6334
    expose:
      - 6333
      - 6334
      - 6335
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_SECRET_KEY}
      QDRANT__SERVICE__JWT_RBAC: "true"
    volumes:
      - ./qdrant_data:/qdrant/storage
    profiles:
      - qdrant_token_auth
 
